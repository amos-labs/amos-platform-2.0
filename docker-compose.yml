# AMOS Full Stack - Development Environment
# ==========================================
# This Docker Compose file runs the AMOS monorepo services together with shared infrastructure.
# This is for local development only. In production, services are deployed separately.
#
# Architecture:
# - amos-platform: Central control plane (ports 4000 HTTP, 4001 gRPC)
# - amos-harness: Per-customer AI business OS (port 3000) [standalone profile]
# - amos-agent: Autonomous AI agent that registers with harness (port 3100) [standalone profile]
# - amos-relay: Network relay / bounty marketplace (port 4100)
# - postgres: Shared PostgreSQL 16 with pgvector (port 5432)
# - redis: Shared Redis 7 (port 6379)
# - localstack: AWS S3 emulation for dev (port 4566)
#
# Default mode: platform + infra (harnesses are provisioned via platform dashboard)
# Standalone mode: docker compose --profile standalone up (harness runs directly)
#
# Note: In production, each service has its own postgres/redis.
# This shared setup is purely for convenience in local development.

services:
  # PostgreSQL 16 with pgvector extension (shared for dev)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: amos_dev_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amos_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-amos_development}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amos_network

  # Redis 7 for caching and job queues (shared for dev)
  redis:
    image: redis:7-alpine
    container_name: amos_dev_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - amos_network

  # LocalStack for S3 emulation (development only)
  # To use: docker compose --profile localstack up
  localstack:
    image: localstack/localstack:latest
    container_name: amos_dev_localstack
    profiles: ["localstack"]
    environment:
      SERVICES: s3
      DEBUG: 0
      DATA_DIR: /tmp/localstack/data
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-west-2}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - amos_network

  # AMOS Platform - Central control plane (provisioning, billing, governance)
  platform:
    build:
      context: ../amos-platform
      dockerfile: Dockerfile
    container_name: amos_dev_platform
    ports:
      - "4000:4000"
      - "4001:4001"
    environment:
      # Server
      AMOS__ENVIRONMENT: ${ENVIRONMENT:-development}
      AMOS__SERVER__HOST: 0.0.0.0
      AMOS__SERVER__PORT: 4000

      # Database (platform uses its own DB)
      AMOS__DATABASE__URL: postgresql://${POSTGRES_USER:-amos}:${POSTGRES_PASSWORD:-amos_dev_password}@postgres:5432/amos_platform_dev
      AMOS__DATABASE__MAX_CONNECTIONS: 20

      # Redis (using db 3 for platform)
      AMOS__REDIS__URL: redis://redis:6379/3
      AMOS__REDIS__POOL_SIZE: 10

      # Vault (stable dev key so encrypted credentials survive container restarts)
      AMOS__VAULT__MASTER_KEY: ${VAULT_MASTER_KEY:-fddcNAcyrkZ7eC9vgMXfRtTGtVAQZT8sost219njm10=}

      # Auth
      AMOS__AUTH__JWT_SECRET: ${AUTH_JWT_SECRET:-dev_jwt_secret_change_in_prod}

      # Docker/Podman socket for Bollard container provisioning
      DOCKER_HOST: unix:///var/run/docker.sock

      # Postgres credentials forwarded so provisioning code can build harness DB URLs
      POSTGRES_USER: ${POSTGRES_USER:-amos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amos_dev_password}

      # AWS Bedrock (forwarded to provisioned harnesses)
      AMOS__BEDROCK__AWS_REGION: ${AWS_REGION:-us-west-2}
      AMOS__BEDROCK__AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AMOS__BEDROCK__AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AMOS__BEDROCK__DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}

      # Stripe billing (per-harness pricing)
      AMOS__STRIPE__SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      AMOS__STRIPE__PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      AMOS__STRIPE__WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      AMOS__STRIPE__PRICE_SMALL: ${STRIPE_PRICE_SMALL:-price_1TJzUOGlkubafVtvglhkzbQf}
      AMOS__STRIPE__PRICE_MEDIUM: ${STRIPE_PRICE_MEDIUM:-price_1TK0NjGlkubafVtvbJuzot1z}
      AMOS__STRIPE__PRICE_LARGE: ${STRIPE_PRICE_LARGE:-price_1TK0NlGlkubafVtvuJOxntmQ}

      # gRPC
      AMOS__GRPC__PORT: 4001

      # Observability
      RUST_LOG: ${RUST_LOG:-info,amos_platform=debug}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    # Run as root so we can access the Podman socket (owned by core:core in the VM)
    user: "0:0"
    security_opt:
      - label=disable
    volumes:
      # Mount the container runtime socket for Bollard provisioning.
      # Override DOCKER_SOCK in .env for Podman or non-standard paths:
      #   macOS Podman: /run/user/501/podman/podman.sock
      #   Linux Docker: /var/run/docker.sock
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amos_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # AMOS Harness - Per-customer AI business OS (standalone mode, no platform)
  # To use: docker compose --profile standalone up
  harness:
    build:
      context: .
      dockerfile: docker/harness/Dockerfile
    image: amos-harness:latest
    container_name: amos_dev_harness
    profiles: ["standalone"]
    ports:
      - "3000:3000"
    environment:
      # Harness identity (multi-harness orchestration)
      AMOS_HARNESS_ROLE: primary
      AMOS_HARNESS_ID: 00000000-0000-0000-0000-000000000001
      # In specialist mode, point to siblings:
      # AMOS_SIBLING_HARNESSES: autoresearch:http://harness-autoresearch:3000

      # Vault (stable dev key so encrypted credentials survive container restarts)
      AMOS__VAULT__MASTER_KEY: ${VAULT_MASTER_KEY:-fddcNAcyrkZ7eC9vgMXfRtTGtVAQZT8sost219njm10=}

      # Server
      AMOS__ENVIRONMENT: ${ENVIRONMENT:-development}
      AMOS__SERVER__HOST: 0.0.0.0
      AMOS__SERVER__PORT: 3000

      # Database (harness uses its own DB)
      AMOS__DATABASE__URL: postgresql://${POSTGRES_USER:-amos}:${POSTGRES_PASSWORD:-amos_dev_password}@postgres:5432/amos_harness_dev
      AMOS__DATABASE__MAX_CONNECTIONS: 20

      # Redis (using db 0 for harness)
      AMOS__REDIS__URL: redis://redis:6379/0
      AMOS__REDIS__POOL_SIZE: 10

      # Customer configuration
      AMOS__CUSTOMER__ID: ${CUSTOMER_ID:-dev-customer-001}
      AMOS__CUSTOMER__NAME: ${CUSTOMER_NAME:-Development Customer}

      # AWS Bedrock (for AI models)
      AMOS__BEDROCK__AWS_REGION: ${AWS_REGION:-us-west-2}
      AMOS__BEDROCK__AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AMOS__BEDROCK__AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AMOS__BEDROCK__DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}
      AMOS__BEDROCK__CHAT_MODEL: ${CHAT_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}
      AMOS__BEDROCK__VOICE_MODEL: ${VOICE_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}

      # Agent configuration
      AMOS__AGENT__MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-50}
      AMOS__AGENT__MAX_CONTEXT_TOKENS: ${AGENT_MAX_CONTEXT_TOKENS:-100000}
      AMOS__AGENT__TOKEN_BUDGET: ${AGENT_TOKEN_BUDGET:-200000}

      # Relay connection
      AMOS__RELAY__URL: http://relay:4100
      AMOS__RELAY__ENABLED: "true"
      AMOS__RELAY__API_KEY: ${RELAY_API_KEY:-dev_relay_key_change_in_prod}

      # Agent sidecar connection (container networking, not localhost)
      AGENT_URL: http://agent:3100

      # Observability
      RUST_LOG: ${RUST_LOG:-info,amos_harness=debug}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    volumes:
      - harness_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amos_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # AMOS Specialist Harness - Autoresearch package (optional multi-harness mode)
  # To use: docker compose --profile specialist up
  harness-autoresearch:
    build:
      context: .
      dockerfile: docker/harness/Dockerfile
    container_name: amos_dev_harness_autoresearch
    profiles: ["specialist"]
    ports:
      - "3001:3000"
    environment:
      # Harness identity
      AMOS_HARNESS_ROLE: specialist
      AMOS_HARNESS_ID: 00000000-0000-0000-0000-000000000002
      AMOS_PACKAGES: autoresearch
      AMOS_SIBLING_HARNESSES: ""
      AMOS_PLATFORM_URL: ${AMOS_PLATFORM_URL:-http://platform:4000}

      # Server
      AMOS__ENVIRONMENT: ${ENVIRONMENT:-development}
      AMOS__SERVER__HOST: 0.0.0.0
      AMOS__SERVER__PORT: 3000

      # Database (shares harness DB for dev)
      AMOS__DATABASE__URL: postgresql://${POSTGRES_USER:-amos}:${POSTGRES_PASSWORD:-amos_dev_password}@postgres:5432/amos_harness_dev
      AMOS__DATABASE__MAX_CONNECTIONS: 10

      # Redis (using db 1 for specialist)
      AMOS__REDIS__URL: redis://redis:6379/1
      AMOS__REDIS__POOL_SIZE: 5

      # Customer configuration
      AMOS__CUSTOMER__ID: ${CUSTOMER_ID:-dev-customer-001}
      AMOS__CUSTOMER__NAME: ${CUSTOMER_NAME:-Development Customer}

      # AWS Bedrock
      AMOS__BEDROCK__AWS_REGION: ${AWS_REGION:-us-west-2}
      AMOS__BEDROCK__AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AMOS__BEDROCK__AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AMOS__BEDROCK__DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}

      # Observability
      RUST_LOG: ${RUST_LOG:-info,amos_harness=debug}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    volumes:
      - harness_autoresearch_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amos_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # AMOS Agent - Autonomous AI agent that registers with harness (standalone mode)
  # To use: docker compose --profile standalone up
  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    container_name: amos_dev_agent
    profiles: ["standalone"]
    ports:
      - "3100:3100"
    environment:
      # Server configuration
      AMOS_SERVE: "true"
      AMOS__SERVER__HOST: 0.0.0.0
      AMOS__SERVER__PORT: 3100

      # Harness connection
      AMOS__HARNESS__URL: http://harness:3000
      AMOS__HARNESS__API_KEY: ${HARNESS_API_KEY:-dev_api_key_change_in_prod}

      # Agent identity
      AMOS__AGENT__ID: ${AGENT_ID:-dev-agent-001}
      AMOS__AGENT__NAME: ${AGENT_NAME:-Development Agent}

      # AWS Bedrock (for AI models)
      AMOS__BEDROCK__AWS_REGION: ${AWS_REGION:-us-west-2}
      AMOS__BEDROCK__AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AMOS__BEDROCK__AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AMOS__BEDROCK__DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic.claude-3-5-sonnet-20241022-v2:0}

      # Agent configuration
      AMOS__AGENT__MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-50}
      AMOS__AGENT__MAX_CONTEXT_TOKENS: ${AGENT_MAX_CONTEXT_TOKENS:-100000}
      AMOS__AGENT__TOKEN_BUDGET: ${AGENT_TOKEN_BUDGET:-200000}

      # Observability
      RUST_LOG: ${RUST_LOG:-info,amos_agent=debug}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    volumes:
      - agent_data:/app/data
    depends_on:
      harness:
        condition: service_healthy
    networks:
      - amos_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # AMOS Relay - Network relay / bounty marketplace
  # To use: docker compose --profile relay up
  relay:
    build:
      context: .
      dockerfile: docker/relay/Dockerfile
    container_name: amos_dev_relay
    profiles: ["relay"]
    ports:
      - "4100:4100"
    environment:
      # Server
      AMOS__ENVIRONMENT: ${ENVIRONMENT:-development}
      AMOS__SERVER__HOST: 0.0.0.0
      AMOS__SERVER__PORT: 4100

      # Database (relay uses its own DB)
      AMOS__DATABASE__URL: postgresql://${POSTGRES_USER:-amos}:${POSTGRES_PASSWORD:-amos_dev_password}@postgres:5432/amos_relay_dev
      AMOS__DATABASE__MAX_CONNECTIONS: 20

      # Redis (using db 2 for relay)
      AMOS__REDIS__URL: redis://redis:6379/2
      AMOS__REDIS__POOL_SIZE: 10

      # Solana
      AMOS__SOLANA__NETWORK: ${SOLANA_NETWORK:-devnet}
      AMOS__SOLANA__RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      AMOS__SOLANA__WS_URL: ${SOLANA_WS_URL:-wss://api.devnet.solana.com}

      # Observability
      RUST_LOG: ${RUST_LOG:-info,amos_relay=debug}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    volumes:
      - relay_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amos_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local
  harness_data:
    driver: local
  agent_data:
    driver: local
  relay_data:
    driver: local
  harness_autoresearch_data:
    driver: local

networks:
  amos_network:
    driver: bridge

# Environment Variables
# =====================
# Copy .env.example to .env and configure:
#
# Required for AWS Bedrock:
# - AWS_ACCESS_KEY_ID
# - AWS_SECRET_ACCESS_KEY
#
# Required for Solana (use devnet in dev):
# - SOLANA_TREASURY_PROGRAM_ID
# - SOLANA_GOVERNANCE_PROGRAM_ID
# - SOLANA_BOUNTY_PROGRAM_ID
#
# Optional (defaults shown):
# - POSTGRES_USER=amos
# - POSTGRES_PASSWORD=amos_dev_password
# - POSTGRES_DB=amos_development
# - ENVIRONMENT=development
# - AWS_REGION=us-west-2
# - SOLANA_NETWORK=devnet
# - CUSTOMER_ID=dev-customer-001
# - CUSTOMER_NAME=Development Customer
# - RELAY_API_KEY=dev_relay_key_change_in_prod
#
# Usage:
# ======
# 1. Copy .env.example to .env
# 2. Set AWS credentials for Bedrock
# 3. Set Solana program IDs (or deploy test programs)
# 4. Run: docker compose up -d
# 5. Check services:
#    - Harness: http://localhost:3000/health
#    - Agent: http://localhost:3100/health
#    - Relay: http://localhost:4100/health
# 6. View logs: docker compose logs -f
# 7. Stop: docker compose down
#
# CLI Usage:
# ==========
# cargo run --bin amos health
# cargo run --bin amos harness status
# cargo run --bin amos relay status
# cargo run --bin amos config show
#
# Production Notes:
# =================
# - This setup is NOT for production
# - In production, deploy harness, relay, and agent separately
# - Each customer harness gets its own postgres/redis
# - Platform is a separate repo (amos-managed-platform)
# - Use managed databases (RDS, ElastiCache)
# - Set strong passwords and proper secrets
# - Enable TLS/SSL
# - Configure proper monitoring and alerting
# - Review all security settings
