{% extends "base.html" %}

{% block title %}Register - AMOS Platform{% endblock %}

{% block body %}
<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h1 class="text-center text-3xl font-bold tracking-tight text-gray-900">AMOS</h1>
    <h2 class="mt-2 text-center text-sm text-gray-600">Create your organization</h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    {% if let Some(err) = error %}
    <div class="mb-4 rounded-md bg-red-50 p-4">
      <p class="text-sm text-red-700">{{ err }}</p>
    </div>
    {% endif %}

    <form class="space-y-5" action="/register" method="POST">
      <div>
        <label for="organization_name" class="block text-sm font-medium text-gray-900">Organization name</label>
        <input id="organization_name" name="organization_name" type="text" required
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
               placeholder="Acme Corp" />
      </div>

      <div>
        <label for="name" class="block text-sm font-medium text-gray-900">Your name</label>
        <input id="name" name="name" type="text" required
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-900">Email address</label>
        <input id="email" name="email" type="email" required
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-900">Password</label>
        <input id="password" name="password" type="password" required minlength="8"
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" />
        <p class="mt-1 text-xs text-gray-500">Minimum 8 characters</p>
      </div>

      <div>
        <label for="plan" class="block text-sm font-medium text-gray-900">Plan</label>
        <select id="plan" name="plan"
                class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
          <option value="free">Free</option>
          <option value="starter">Starter</option>
          <option value="growth">Growth</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>

      <button type="submit"
              class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
        Create account
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Already have an account?
      <a href="/login" class="font-semibold text-indigo-600 hover:text-indigo-500">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
