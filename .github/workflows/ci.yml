name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true
  AWS_REGION: us-east-1
  ECR_REGISTRY: 637423327454.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ============================================================================
  # GATE 1: Format, Lint, Unit Tests, Security Audit
  # ============================================================================
  check:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Run Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

      - name: Run doc tests
        run: cargo test --doc

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit dependencies
        run: cargo audit
        continue-on-error: true  # Advisory-only for now

  # ============================================================================
  # GATE 2: Build Docker images, push to ECR, deploy to ECS
  # Only runs on push to main (not PRs) after checks pass
  # ============================================================================
  deploy:
    name: Build & Deploy
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423327454:role/github-actions-amos-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push amos-harness
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/harness/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/amos-harness:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/amos-harness:latest

      - name: Build and push amos-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/amos-agent:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/amos-agent:latest

      - name: Register new harness task definition
        id: task-def
        run: |
          # Update images in task definition to the new tag
          TASK_DEF=$(cat deploy/task-definition-harness.json \
            | jq --arg IMG_TAG "${{ steps.vars.outputs.IMAGE_TAG }}" \
                  --arg REGISTRY "${{ env.ECR_REGISTRY }}" \
              '.containerDefinitions[0].image = ($REGISTRY + "/amos-harness:" + $IMG_TAG) |
               .containerDefinitions[1].image = ($REGISTRY + "/amos-agent:" + $IMG_TAG)')

          # Register the new task definition
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$NEW_TASK_DEF_ARN" >> "$GITHUB_OUTPUT"
          echo "Registered task definition: $NEW_TASK_DEF_ARN"

      - name: Deploy harness tasks
        run: |
          CLUSTER="swarm-infrastructure-cluster"
          SUBNET="subnet-05f852baea780f94d"
          SECURITY_GROUP="sg-0967e26d543a5ce47"
          TASK_DEF_ARN="${{ steps.task-def.outputs.task_def_arn }}"

          # Stop existing harness tasks
          TASK_ARNS=$(aws ecs list-tasks --cluster "$CLUSTER" \
            --family amos-harness-amos-labs \
            --query 'taskArns[]' --output text)

          if [ -n "$TASK_ARNS" ]; then
            for TASK_ARN in $TASK_ARNS; do
              echo "Stopping task: $TASK_ARN"
              aws ecs stop-task --cluster "$CLUSTER" --task "$TASK_ARN" \
                --reason "Redeploying with new image ${{ steps.vars.outputs.IMAGE_TAG }}"
            done
            echo "Waiting for tasks to stop..."
            sleep 10
          fi

          # Launch new task with the updated task definition
          echo "Starting new task: $TASK_DEF_ARN"
          NEW_TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "{
              \"awsvpcConfiguration\": {
                \"subnets\": [\"$SUBNET\"],
                \"securityGroups\": [\"$SECURITY_GROUP\"],
                \"assignPublicIp\": \"ENABLED\"
              }
            }" \
            --query 'tasks[0].taskArn' --output text)
          echo "Launched task: $NEW_TASK_ARN"

          # Wait for task to reach RUNNING state
          echo "Waiting for task to start..."
          sleep 30
          TASK_STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$NEW_TASK_ARN" \
            --query 'tasks[0].lastStatus' --output text)
          echo "Task status: $TASK_STATUS"

          if [ "$TASK_STATUS" != "RUNNING" ]; then
            echo "Waiting longer..."
            sleep 30
            TASK_STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$NEW_TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            echo "Task status: $TASK_STATUS"
          fi

          # Get new task IP and register with ALB target groups
          TASK_IP=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$NEW_TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`privateIPv4Address`].value' \
            --output text)
          echo "Task IP: $TASK_IP"

          if [ -n "$TASK_IP" ] && [ "$TASK_IP" != "None" ]; then
            # Deregister any stale targets and register the new IP
            for TG_ARN in \
              "arn:aws:elasticloadbalancing:us-east-1:637423327454:targetgroup/harness-amos-labs-51b5/ab8f4fe461c88e15"; do

              # Deregister old targets
              OLD_TARGETS=$(aws elbv2 describe-target-health --target-group-arn "$TG_ARN" \
                --query 'TargetHealthDescriptions[].Target.Id' --output text 2>/dev/null || true)
              for OLD_IP in $OLD_TARGETS; do
                if [ "$OLD_IP" != "$TASK_IP" ]; then
                  echo "Deregistering old target $OLD_IP from $(basename $TG_ARN)"
                  aws elbv2 deregister-targets --target-group-arn "$TG_ARN" \
                    --targets Id=$OLD_IP,Port=3000 2>/dev/null || true
                fi
              done

              # Register new target
              echo "Registering $TASK_IP in $(basename $TG_ARN)"
              aws elbv2 register-targets --target-group-arn "$TG_ARN" \
                --targets Id=$TASK_IP,Port=3000
            done
            echo "ALB target groups updated."
          else
            echo "WARNING: Could not determine task IP for ALB registration."
          fi
