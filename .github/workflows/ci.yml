name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true
  AWS_REGION: us-east-1
  ECR_REGISTRY: 637423327454.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ============================================================================
  # GATE 1: Format, Lint, Unit Tests, Security Audit
  # ============================================================================
  check:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Run Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

      - name: Run doc tests
        run: cargo test --doc

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit dependencies
        run: cargo audit
        continue-on-error: true  # Advisory-only for now

  # ============================================================================
  # GATE 2: Build Docker images, push to ECR, deploy to ECS
  # Only runs on push to main (not PRs) after checks pass
  # ============================================================================
  deploy:
    name: Build & Deploy
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423327454:role/github-actions-amos-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push amos-harness
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/harness/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/amos-harness:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/amos-harness:latest

      - name: Build and push amos-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/amos-agent:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/amos-agent:latest

      - name: Register release with platform
        run: |
          curl -sf -X POST "https://app.amoslabs.com/api/v1/releases" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"${{ steps.vars.outputs.IMAGE_TAG }}\",\"commit_sha\":\"${GITHUB_SHA}\",\"harness_image\":\"${{ env.ECR_REGISTRY }}/amos-harness:${{ steps.vars.outputs.IMAGE_TAG }}\",\"agent_image\":\"${{ env.ECR_REGISTRY }}/amos-agent:${{ steps.vars.outputs.IMAGE_TAG }}\"}"
          echo "Release ${{ steps.vars.outputs.IMAGE_TAG }} registered — deploy via dashboard."
