version: '3.8'

# AMOS Platform - Central Service
# ================================
# This Docker Compose file runs the central AMOS platform.
# Single instance managing token economics, governance, billing for all customers.
#
# Architecture:
# - amos-platform: Central platform service (HTTP: 4000, gRPC: 4001)
# - postgres: Platform database with pgvector
# - redis: Platform cache and job queue
# - localstack: Solana devnet testing (optional, dev only)

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: amos_platform_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amos_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-amos_platform}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_network

  # Redis 7 for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: amos_platform_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - platform_network

  # LocalStack for Solana devnet testing (optional)
  localstack:
    image: localstack/localstack:latest
    container_name: amos_platform_localstack
    profiles:
      - dev
    environment:
      SERVICES: s3
      DEBUG: 0
      DATA_DIR: /tmp/localstack/data
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-west-2}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - platform_network

  # AMOS Platform - Central token economics/governance/billing
  platform:
    build:
      context: ../..
      dockerfile: docker/platform/Dockerfile
    container_name: amos_platform
    ports:
      - "${PLATFORM_HTTP_PORT:-4000}:4000"
      - "${PLATFORM_GRPC_PORT:-4001}:4001"
    environment:
      # Environment
      AMOS__ENVIRONMENT: ${ENVIRONMENT:-production}

      # Server
      AMOS__SERVER__HOST: 0.0.0.0
      AMOS__SERVER__PORT: 4000
      AMOS__SERVER__GRPC_PORT: 4001

      # Database
      AMOS__DATABASE__URL: postgresql://${POSTGRES_USER:-amos}:${POSTGRES_PASSWORD:-amos_dev_password}@postgres:5432/${POSTGRES_DB:-amos_platform}
      AMOS__DATABASE__MAX_CONNECTIONS: ${DB_POOL_SIZE:-50}

      # Redis
      AMOS__REDIS__URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      AMOS__REDIS__POOL_SIZE: ${REDIS_POOL_SIZE:-20}

      # Solana
      AMOS__SOLANA__NETWORK: ${SOLANA_NETWORK:-mainnet-beta}
      AMOS__SOLANA__RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      AMOS__SOLANA__WS_URL: ${SOLANA_WS_URL:-wss://api.mainnet-beta.solana.com}
      AMOS__SOLANA__TREASURY_PROGRAM_ID: ${SOLANA_TREASURY_PROGRAM_ID}
      AMOS__SOLANA__GOVERNANCE_PROGRAM_ID: ${SOLANA_GOVERNANCE_PROGRAM_ID}
      AMOS__SOLANA__BOUNTY_PROGRAM_ID: ${SOLANA_BOUNTY_PROGRAM_ID}
      AMOS__SOLANA__TREASURY_KEYPAIR_PATH: /app/keys/treasury.json

      # AWS (for S3, etc.)
      AMOS__AWS__REGION: ${AWS_REGION:-us-west-2}
      AMOS__AWS__ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AMOS__AWS__SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AMOS__AWS__S3_BUCKET: ${AWS_S3_BUCKET:-amos-platform-data}

      # Bedrock (for AI operations)
      AMOS__BEDROCK__AWS_REGION: ${AWS_REGION:-us-west-2}
      AMOS__BEDROCK__AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AMOS__BEDROCK__AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      # Token economics
      AMOS__TOKEN__INITIAL_SUPPLY: ${TOKEN_INITIAL_SUPPLY:-21000000}
      AMOS__TOKEN__BASE_DECAY_RATE_BPS: ${TOKEN_BASE_DECAY_BPS:-730}

      # Billing
      AMOS__BILLING__STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      AMOS__BILLING__STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # Observability
      RUST_LOG: ${RUST_LOG:-info,amos_platform=debug}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}

      # Metrics and tracing
      AMOS__TELEMETRY__OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
      AMOS__TELEMETRY__PROMETHEUS_PORT: ${PROMETHEUS_PORT:-9090}
    volumes:
      - platform_data:/app/data
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local
  platform_data:
    driver: local

networks:
  platform_network:
    driver: bridge

# Environment Variables
# =====================
# Required:
# - SOLANA_TREASURY_PROGRAM_ID: Solana treasury program address
# - SOLANA_GOVERNANCE_PROGRAM_ID: Solana governance program address
# - SOLANA_BOUNTY_PROGRAM_ID: Solana bounty program address
# - AWS_ACCESS_KEY_ID: AWS credentials
# - AWS_SECRET_ACCESS_KEY: AWS secret key
# - STRIPE_SECRET_KEY: Stripe secret key for billing
# - STRIPE_WEBHOOK_SECRET: Stripe webhook secret
#
# Optional (defaults shown):
# - ENVIRONMENT=production
# - PLATFORM_HTTP_PORT=4000
# - PLATFORM_GRPC_PORT=4001
# - POSTGRES_USER=amos
# - POSTGRES_PASSWORD=amos_dev_password
# - POSTGRES_DB=amos_platform
# - POSTGRES_PORT=5433 (avoid conflict with harness on 5432)
# - REDIS_PORT=6380 (avoid conflict with harness on 6379)
# - REDIS_PASSWORD= (empty, no auth in dev)
# - SOLANA_NETWORK=mainnet-beta
# - SOLANA_RPC_URL=https://api.mainnet-beta.solana.com
# - AWS_REGION=us-west-2
# - DB_POOL_SIZE=50
# - REDIS_POOL_SIZE=20
#
# Usage:
# 1. Copy .env.example to .env
# 2. Set required environment variables
# 3. Place Solana keypairs in ./keys/treasury.json
# 4. Run: docker compose up -d
# 5. Check logs: docker compose logs -f platform
# 6. Health check: curl http://localhost:4000/health
#
# Development with LocalStack:
# Run with dev profile: docker compose --profile dev up -d
